name: Build ArmaReforgerBot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Tesseract
      run: |
        choco install tesseract -y --no-progress
        refreshenv
        where tesseract

    - name: Upgrade pip and install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Debug: list installed packages
      run: pip list

    - name: Syntax check all Python files
      shell: pwsh
      run: |
        Write-Host "Checking syntax..."
        Get-ChildItem -Recurse -Filter *.py | ForEach-Object {
            python -m py_compile $_.FullName
        }

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name ArmaReforgerBot main.py --hidden-import PySide6.QtCore --hidden-import PySide6.QtGui --hidden-import PySide6.QtWidgets --hidden-import loguru

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arma-bot
        path: dist/ArmaReforgerBot.exe